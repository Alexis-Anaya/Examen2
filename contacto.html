<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- HEADER -->
<header class="p-5">
        <section class="container-fluid d-flex flex-column align-items-center text-white">
            <div class="d-flex flex-row align-items-center" id="Titulo01">
                <img src="Imagenes/Logo01.webp" alt="" width="100px" height="100px">
                <h1 class="ms-4 fw-bold">Los Lobos Mecanicos</h1>
            </div>
            <div><h2 id="Titulo02">Taller Mecanico Universitario</h2></div>
        </section>
    </header>

<!-- NAVBAR -->
<nav class="navbar bg-dark d-flex justify-content-center">
    <a class="fs-5 btn btn-outline-light btn-lm me-3" href="index.html">Inicio</a>
    <a class="fs-5 btn btn-outline-light btn-lm me-3" href="Servicios.html">Servicios</a>
    <a class="fs-5 btn btn-secondary btn-lm disabled me-3" href="#">Contacto</a>
</nav>

<!-- FORMULARIO -->
<section class="container mt-4 py-4 text-center" id="Color">
    <h1 class="mb-4">Formulario de Contacto</h1>

    <form id="formulario" class="row g-3 justify-content-center">

        <div class="col-md-6 text-start">
            <label for="nombre" class="form-label fw-bold">Nombre:</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ingrese su nombre" required>
        </div>

        <div class="col-md-6 text-start">
            <label for="correo" class="form-label fw-bold">Correo:</label>
            <input type="email" id="correo" class="form-control" placeholder="Necesita ser un correo valido" required>
        </div>

        <div class="col-md-6 text-start">
            <label for="servicio" class="form-label fw-bold">Tipo de Servicio:</label>
            <select id="servicio" class="form-select" required>
                <option value="">Selecciona</option>
                <option value="Diagnostico">Diagnostico</option>
                <option value="MantenimientoG">Mantenimiento General</option>
                <option value="MantenimientoC">Mantenimiento Completo</option>
                <option value="CambioAceite">Cambio de Aceite</option>
                <option value="CambioLlantas">Cambio de LLantas</option>
                <option value="Pintura">Pintura Nueva</option>
                <option value="Lavado">Lavado de Carro</option>
                <option value="Deluxe">Paquete Completo</option>
                <option value="Practica">Registro Practicas Profesionales</option>
                <option value="Otro">Otra Consulta</option>
            </select>
        </div>

        <div class="col-md-8 text-start">
            <label for="Message" class="form-label fw-bold">Mensaje:</label>
            <textarea id="Message" class="form-control" rows="4" placeholder="Escriba aqui su mensaje!" required></textarea>
        </div>

        <div class="col-12">
            <button type="submit" id="Enviar" class="btn btn-success px-4 fw-bold">
                Enviar mensaje
            </button>
        </div>

    </form>

    <p id="mensaje" class="mt-3 fw-bold"></p>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-4">
    <p>©2026 Los-Lobos-Mecánicos</p>
</footer>

<script src="script.js"></script>

</body>
</html>
